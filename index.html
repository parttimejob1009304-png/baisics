<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mystère — Mystery Box Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Jost',sans-serif;background:#FDF8F0;min-height:100vh}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#FDF8F0}
::-webkit-scrollbar-thumb{background:#F9C4D6;border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{transform:translateX(110%)}to{transform:translateX(0)}}
@keyframes fadeInBg{from{opacity:0}to{opacity:1}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.fu{animation:fadeUp .4s ease both}
.oi{animation:fadeInBg .2s ease both}
.si{animation:slideIn .35s cubic-bezier(.34,1.1,.64,1) both}
.mi{animation:fadeUp .3s cubic-bezier(.34,1.1,.64,1) both}
.fl{animation:floatY 3.5s ease-in-out infinite}
.card{transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s}
.card:hover{transform:translateY(-5px) scale(1.012)}
.btn{transition:all .2s ease;cursor:pointer;outline:none;border:none;font-family:'Jost',sans-serif}
.btn:hover{transform:translateY(-2px);filter:brightness(.97)}
.btn:active{transform:scale(.97)}
input,textarea,select{outline:none;font-family:'Jost',sans-serif}
input:focus,textarea:focus{border-color:#F9C4D6!important;box-shadow:0 0 0 3px rgba(249,196,214,.25)!important}
@media(max-width:600px){.hsm{display:none!important}}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const {useState,useEffect} = React;

/* ── COLOURS ── */
const C={
  cream:"#FDF8F0",white:"#FFFFFF",
  pl:"#FFF0F6",pm:"#F9C4D6",pd:"#E8859F",
  yl:"#FFFBEE",ym:"#F5E190",yd:"#C8A800",
  t:"#3C2A1E",tm:"#7A5C44",tl:"#B09880",
  b:"#EEE5D8",
  sh:"0 4px 20px rgba(180,140,120,.1)",
  sh2:"0 12px 36px rgba(180,120,120,.16)"
};

/* ── LOCAL STORAGE (works in any browser) ── */
const save=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};
const load=(k)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);

/* ── DEFAULT DATA ── */
const DEMO=[
  {id:"i1",name:"Celestial Dream Box",price:45,originalPrice:65,images:["https://images.unsplash.com/photo-1607344645866-009c320b63e0?w=600&q=80"],description:"A magical collection of celestial-themed surprises. Each box contains 5–7 handpicked items including crystal accessories, star-shaped skincare, and dreamy home décor pieces.\n\nEvery item is chosen to bring a little magic into your everyday life. ✦",category:"Premium",stock:8,tags:["new","popular"]},
  {id:"i2",name:"Rosé Bliss Box",price:28,originalPrice:null,images:["https://images.unsplash.com/photo-1559181567-c3190ca9959b?w=600&q=80"],description:"Everything pink, everything pretty. A delightful curation of beauty products, accessories, and lifestyle items in gorgeous shades of pink and rose gold.\n\nPerfect for gifting or treating yourself. 🌸",category:"Beauty",stock:15,tags:["bestseller"]},
  {id:"i3",name:"Golden Hour Box",price:35,originalPrice:50,images:["https://images.unsplash.com/photo-1549465220-1a8b9238cd48?w=600&q=80"],description:"Warm, golden, luxurious. This box captures the magic of the golden hour — amber jewellery, honey-scented candles, and warm-toned treasures await inside. ✨",category:"Lifestyle",stock:12,tags:[]},
  {id:"i4",name:"Fairy Garden Box",price:22,originalPrice:null,images:["https://images.unsplash.com/photo-1416879595882-3373a0480b5b?w=600&q=80"],description:"Enchanting botanical surprises. Nature-inspired items that bring the magic of a fairy garden to your everyday — pressed flowers, botanical soaps, and more. 🌿",category:"Nature",stock:20,tags:["new"]},
  {id:"i5",name:"Midnight Luxe Box",price:65,originalPrice:90,images:["https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600&q=80"],description:"Our most exclusive box. Ultra-luxury items from premium brands, very limited stock. A box for those who truly deserve the best. Expect the extraordinary. 🖤",category:"Luxury",stock:5,tags:["limited"]},
  {id:"i6",name:"Sweet Dreams Box",price:18,originalPrice:null,images:["https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=600&q=80"],description:"Soft, cozy, and oh-so-sweet. Sleep accessories, calming skincare, and comfort items for your ultimate relaxation routine. The perfect self-care gift. 🌙",category:"Wellness",stock:25,tags:[]},
];
const DCFG={whatsapp:"60123456789",adminPass:"admin123",siteName:"Mystère",tagline:"curated mystery boxes ✦",discPct:10};

/* ── HELPERS ── */
const iSt=(x={})=>({width:"100%",padding:"11px 15px",borderRadius:10,border:`1.5px solid ${C.b}`,fontSize:14,background:C.cream,color:C.t,fontFamily:"'Jost',sans-serif",...x});
function Lbl({c,children}){return <label style={{fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:".09em",color:C.tm,display:"block",marginBottom:5}}>{c||children}</label>;}
function Tag({ch,bg,col}){return <span style={{background:bg||C.yl,color:col||C.tm,borderRadius:50,padding:"3px 10px",fontSize:11,fontWeight:500}}>{ch}</span>;}
function Notif({m}){return <div className="mi" style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:C.t,color:C.white,padding:"10px 24px",borderRadius:50,zIndex:9999,fontSize:13,whiteSpace:"nowrap",boxShadow:"0 6px 20px rgba(0,0,0,.2)"}}>{m}</div>;}

/* ════════════ APP ════════════ */
function App(){
  const[pg,setPg]=useState("shop");
  const[cur,setCur]=useState(null);
  const[items,setItemsS]=useState(()=>load("mx:items")||DEMO);
  const[cart,setCart]=useState([]);
  const[cOpen,setCOpen]=useState(false);
  const[aOpen,setAOpen]=useState(false);
  const[aMode,setAMode]=useState("login");
  const[user,setUser]=useState(null);
  const[users,setUsersS]=useState(()=>load("mx:users")||[]);
  const[cfg,setCfgS]=useState(()=>load("mx:cfg")||DCFG);
  const[notif,setNotif]=useState(null);
  const[adminOk,setAdminOk]=useState(false);

  const toast=m=>{setNotif(m);setTimeout(()=>setNotif(null),3000)};
  const saveItems=v=>{setItemsS(v);save("mx:items",v)};
  const saveUsers=v=>{setUsersS(v);save("mx:users",v)};
  const saveCfg=v=>{setCfgS(v);save("mx:cfg",v)};

  const addCart=(it,qty=1)=>{
    setCart(p=>{const e=p.find(c=>c.id===it.id);return e?p.map(c=>c.id===it.id?{...c,qty:c.qty+qty}:c):[...p,{...it,qty}]});
    toast(`${it.name} added to cart 🛍️`);
  };
  const remCart=id=>setCart(p=>p.filter(c=>c.id!==id));
  const updQty=(id,q)=>{if(q<1)return remCart(id);setCart(p=>p.map(c=>c.id===id?{...c,qty:q}:c))};

  const cnt=cart.reduce((s,c)=>s+c.qty,0);
  const sub=cart.reduce((s,c)=>s+c.price*c.qty,0);
  const hasDisc=user&&user.discUsed===false;
  const disc=hasDisc?sub*(cfg.discPct/100):0;
  const total=sub-disc;

  const goItem=it=>{setCur(it);setPg("item");window.scrollTo(0,0)};
  const goShop=()=>{setPg("shop");setCur(null)};

  const checkout=()=>{
    if(!cart.length)return;
    const n=user?user.name:"Customer";
    const lines=cart.map(c=>`• ${c.name} x${c.qty} — RM${(c.price*c.qty).toFixed(2)}`).join("\n");
    let msg=`Hello! I'd like to place an order 🛍️\n\n*Order Details:*\n${lines}\n\n`;
    if(disc>0)msg+=`Discount (${cfg.discPct}%): -RM${disc.toFixed(2)}\n`;
    msg+=`*Total: RM${total.toFixed(2)}*\n\nName: ${n}`;
    if(user&&user.email)msg+=`\nEmail: ${user.email}`;
    window.open(`https://wa.me/${cfg.whatsapp}?text=${encodeURIComponent(msg)}`,"_blank");
    if(hasDisc&&user){const u2={...user,discUsed:true};setUser(u2);saveUsers(users.map(u=>u.email===user.email?u2:u))}
  };

  return (
    <div style={{minHeight:"100vh",background:C.cream}}>
      {notif&&<Notif m={notif}/>}

      {/* ── NAV ── */}
      <nav style={{position:"sticky",top:0,zIndex:100,background:"rgba(253,248,240,.95)",backdropFilter:"blur(12px)",borderBottom:`1px solid ${C.b}`,padding:"0 20px"}}>
        <div style={{maxWidth:1200,margin:"0 auto",height:60,display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
          <button onClick={goShop} className="btn" style={{background:"none",display:"flex",alignItems:"center",gap:7,padding:0}}>
            <span style={{color:C.pd,fontSize:18}}>✦</span>
            <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:500,color:C.t}}>{cfg.siteName}</span>
          </button>
          <div style={{display:"flex",alignItems:"center",gap:7}}>
            <button onClick={()=>setPg("admin")} className="btn" style={{background:"none",padding:"5px 10px",fontSize:12,color:C.tl,borderRadius:50}}>
              {pg==="admin"?"← shop":"admin"}
            </button>
            {user?(
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                <span style={{fontSize:12,color:C.tm}} className="hsm">{user.name.split(" ")[0]}</span>
                <button onClick={()=>setUser(null)} className="btn" style={{background:C.pl,borderRadius:50,padding:"6px 14px",fontSize:12,color:C.pd}}>logout</button>
              </div>
            ):(
              <div style={{display:"flex",gap:5}}>
                <button onClick={()=>{setAMode("login");setAOpen(true)}} className="btn" style={{background:"none",border:`1.5px solid ${C.b}`,borderRadius:50,padding:"6px 14px",fontSize:13,color:C.t}}>login</button>
                <button onClick={()=>{setAMode("signup");setAOpen(true)}} className="btn hsm" style={{background:C.pm,borderRadius:50,padding:"6px 14px",fontSize:13,color:C.t}}>sign up</button>
              </div>
            )}
            <button onClick={()=>setCOpen(true)} className="btn" style={{position:"relative",background:C.t,borderRadius:"50%",width:38,height:38,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <span style={{fontSize:16}}>🛍️</span>
              {cnt>0&&<span style={{position:"absolute",top:-4,right:-4,background:C.pd,color:C.white,borderRadius:"50%",width:18,height:18,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700}}>{cnt}</span>}
            </button>
          </div>
        </div>
      </nav>

      {pg==="shop"&&<ShopPage items={items} onItem={goItem} onAdd={addCart} cfg={cfg}/>}
      {pg==="item"&&cur&&<ItemPage item={cur} items={items} onBack={goShop} onAdd={addCart} onItem={goItem}/>}
      {pg==="admin"&&<AdminPage ok={adminOk} onAuth={p=>{if(p===cfg.adminPass){setAdminOk(true);return true}return false}} items={items} saveItems={saveItems} users={users} cfg={cfg} saveCfg={saveCfg} onBack={goShop} toast={toast}/>}

      {cOpen&&<CartDrawer cart={cart} onClose={()=>setCOpen(false)} onRem={remCart} onQty={updQty} onCheckout={checkout} sub={sub} disc={disc} total={total} hasDisc={hasDisc} discPct={cfg.discPct} user={user} onSignup={()=>{setCOpen(false);setAMode("signup");setAOpen(true)}}/>}
      {aOpen&&<AuthModal mode={aMode} setMode={setAMode} onClose={()=>setAOpen(false)} users={users} saveUsers={saveUsers} onLogin={u=>{setUser(u);setAOpen(false);toast(`Welcome back, ${u.name}! 💕`)}} onSignup={u=>{setUser(u);setAOpen(false);toast(`Welcome ${u.name}! 🎉 You've got ${cfg.discPct}% off your first order!`)}} cfg={cfg}/>}
    </div>
  );
}

/* ── SHOP PAGE ── */
function ShopPage({items,onItem,onAdd,cfg}){
  const[cat,setCat]=useState("All");
  const[q,setQ]=useState("");
  const cats=["All",...[...new Set(items.map(i=>i.category).filter(Boolean))]];
  const list=items.filter(i=>(cat==="All"||i.category===cat)&&i.name.toLowerCase().includes(q.toLowerCase()));
  return(
    <div>
      {/* Hero */}
      <div style={{background:`linear-gradient(150deg,${C.pl} 0%,${C.yl} 55%,${C.cream} 100%)`,padding:"68px 24px 48px",textAlign:"center",position:"relative",overflow:"hidden"}}>
        {[{top:"10%",left:"5%",s:26,d:0},{top:"20%",right:"7%",s:15,d:1.1},{bottom:"12%",right:"10%",s:20,d:.5},{bottom:"20%",left:"12%",s:10,d:1.7}].map((p,i)=>(
          <span key={i} className="fl" style={{position:"absolute",fontSize:p.s,opacity:.18,color:C.pd,top:p.top,left:p.left,right:p.right,bottom:p.bottom,animationDelay:`${p.d}s`}}>✦</span>
        ))}
        <p style={{fontSize:11,letterSpacing:".3em",textTransform:"uppercase",color:C.pd,marginBottom:8,fontWeight:500}}>welcome to</p>
        <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"clamp(48px,8vw,84px)",fontWeight:400,color:C.t,lineHeight:1,marginBottom:8}}>{cfg.siteName}</h1>
        <p style={{color:C.tm,fontSize:14,marginBottom:30}}>{cfg.tagline}</p>
        <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
          {["✦ mystery inside","✦ curated with love","✦ free surprise"].map(t=>(
            <span key={t} style={{background:C.white,border:`1px solid ${C.b}`,borderRadius:50,padding:"6px 16px",fontSize:12,color:C.tm}}>{t}</span>
          ))}
        </div>
      </div>

      {/* Grid */}
      <div style={{maxWidth:1200,margin:"0 auto",padding:"28px 20px 0"}}>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center",marginBottom:22}}>
          <input placeholder="search mystery boxes…" value={q} onChange={e=>setQ(e.target.value)}
            style={{flex:1,minWidth:160,padding:"9px 18px",borderRadius:50,border:`1.5px solid ${C.b}`,background:C.white,fontSize:14,color:C.t}}/>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {cats.map(c=>(
              <button key={c} onClick={()=>setCat(c)} className="btn"
                style={{padding:"7px 16px",borderRadius:50,border:`1.5px solid ${cat===c?C.pd:C.b}`,background:cat===c?C.pl:C.white,color:cat===c?C.pd:C.tm,fontSize:13}}>
                {c}
              </button>
            ))}
          </div>
        </div>
        {list.length===0?(
          <div style={{textAlign:"center",padding:"64px 0",color:C.tl}}>
            <div style={{fontSize:40,marginBottom:12}}>✦</div>
            <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22}}>No boxes found</p>
          </div>
        ):(
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:20,paddingBottom:60}}>
            {list.map((it,i)=><ItemCard key={it.id} item={it} onItem={onItem} onAdd={onAdd} delay={i*50}/>)}
          </div>
        )}
      </div>
    </div>
  );
}

/* ── ITEM CARD ── */
function ItemCard({item,onItem,onAdd,delay=0}){
  const[h,setH]=useState(false);
  return(
    <div className="card fu" onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
      style={{background:C.white,borderRadius:20,overflow:"hidden",boxShadow:h?C.sh2:C.sh,animationDelay:`${delay}ms`}}>
      <div onClick={()=>onItem(item)} style={{position:"relative",paddingTop:"100%",overflow:"hidden",background:C.pl,cursor:"pointer"}}>
        <img src={item.images&&item.images[0]} alt={item.name} onError={e=>e.target.style.display="none"}
          style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",transition:"transform .5s",transform:h?"scale(1.07)":"scale(1)"}}/>
        {item.originalPrice&&<div style={{position:"absolute",top:10,left:10,background:C.pm,borderRadius:50,padding:"3px 10px",fontSize:11,fontWeight:600,color:C.t}}>SALE</div>}
        {item.tags&&item.tags.includes("limited")&&<div style={{position:"absolute",top:10,right:10,background:C.ym,borderRadius:50,padding:"3px 10px",fontSize:11,fontWeight:600,color:C.t}}>LIMITED</div>}
        {item.tags&&item.tags.includes("bestseller")&&!item.tags.includes("limited")&&<div style={{position:"absolute",top:10,right:10,background:C.yl,border:`1px solid ${C.ym}`,borderRadius:50,padding:"3px 10px",fontSize:11,fontWeight:600,color:C.yd}}>★ BEST</div>}
        {item.tags&&item.tags.includes("new")&&!item.tags.includes("limited")&&!item.tags.includes("bestseller")&&<div style={{position:"absolute",top:10,right:10,background:C.white,borderRadius:50,padding:"3px 10px",fontSize:11,fontWeight:600,color:C.pd}}>NEW</div>}
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(253,248,240,.55)",opacity:h?1:0,transition:"opacity .3s"}}>
          <span style={{fontSize:36}}>🎁</span>
        </div>
      </div>
      <div style={{padding:"14px 16px 16px"}}>
        <span style={{fontSize:10,color:C.pd,textTransform:"uppercase",letterSpacing:".12em",fontWeight:600}}>{item.category}</span>
        <h3 onClick={()=>onItem(item)} style={{fontFamily:"'Cormorant Garamond',serif",fontSize:19,fontWeight:500,color:C.t,margin:"4px 0 8px",lineHeight:1.25,cursor:"pointer"}}>{item.name}</h3>
        <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:12}}>
          <span style={{fontSize:16,fontWeight:700,color:C.t}}>RM {item.price.toFixed(2)}</span>
          {item.originalPrice&&<span style={{fontSize:12,color:C.tl,textDecoration:"line-through"}}>RM {item.originalPrice.toFixed(2)}</span>}
        </div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>onItem(item)} className="btn" style={{flex:1,padding:"8px",borderRadius:10,background:C.cream,border:`1.5px solid ${C.b}`,color:C.tm,fontSize:13}}>View</button>
          <button onClick={e=>{e.stopPropagation();onAdd(item)}} className="btn" style={{flex:2,padding:"8px",borderRadius:10,background:C.t,color:C.white,fontSize:13}}>Add to Cart</button>
        </div>
      </div>
    </div>
  );
}

/* ── ITEM PAGE ── */
function ItemPage({item,items,onBack,onAdd,onItem}){
  const[si,setSi]=useState(0);
  const[qty,setQty]=useState(1);
  const recs=items.filter(i=>i.id!==item.id).slice(0,4);
  const pct=item.originalPrice?Math.round((1-item.price/item.originalPrice)*100):0;
  return(
    <div style={{maxWidth:1200,margin:"0 auto",padding:"26px 20px 60px"}}>
      <button onClick={onBack} className="btn" style={{background:"none",padding:"5px 0",color:C.tm,fontSize:14,marginBottom:20,display:"flex",alignItems:"center",gap:5}}>← back to shop</button>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:40,marginBottom:60}}>
        {/* Image */}
        <div>
          <div style={{borderRadius:24,overflow:"hidden",background:C.pl,paddingTop:"100%",position:"relative",marginBottom:10,boxShadow:C.sh}}>
            <img src={(item.images&&item.images[si])||""} alt={item.name} onError={e=>e.target.style.display="none"}
              style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover"}}/>
          </div>
          {item.images&&item.images.length>1&&(
            <div style={{display:"flex",gap:8}}>
              {item.images.map((img,i)=>(
                <div key={i} onClick={()=>setSi(i)}
                  style={{width:66,height:66,borderRadius:12,overflow:"hidden",border:`2px solid ${si===i?C.pd:"transparent"}`,cursor:"pointer",background:C.pl,transition:"border-color .2s"}}>
                  <img src={img} alt="" onError={e=>e.target.style.display="none"} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                </div>
              ))}
            </div>
          )}
        </div>
        {/* Details */}
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          <div>
            <span style={{fontSize:11,color:C.pd,textTransform:"uppercase",letterSpacing:".14em",fontWeight:600}}>{item.category}</span>
            <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"clamp(28px,5vw,48px)",fontWeight:400,color:C.t,lineHeight:1.1,margin:"6px 0"}}>{item.name}</h1>
            <div style={{display:"flex",alignItems:"baseline",gap:10,flexWrap:"wrap"}}>
              <span style={{fontSize:28,fontWeight:700,color:C.t}}>RM {item.price.toFixed(2)}</span>
              {item.originalPrice&&(
                <>
                  <span style={{fontSize:15,color:C.tl,textDecoration:"line-through"}}>RM {item.originalPrice.toFixed(2)}</span>
                  <span style={{fontSize:12,background:C.pm,padding:"3px 10px",borderRadius:50,color:C.t,fontWeight:600}}>{pct}% off</span>
                </>
              )}
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:7}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:item.stock>5?"#7DC87D":item.stock>0?"#F5D76E":"#F08080"}}/>
            <span style={{fontSize:13,color:C.tm}}>{item.stock>5?"In stock":item.stock>0?`Only ${item.stock} left!`:"Out of stock"}</span>
          </div>
          {item.tags&&item.tags.length>0&&(
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {item.tags.map(t=><Tag key={t} ch={`✦ ${t}`} bg={C.yl} col={C.tm}/>)}
            </div>
          )}
          <div style={{background:C.cream,borderRadius:16,padding:"16px 18px"}}>
            <p style={{fontSize:14,lineHeight:1.85,color:C.tm,whiteSpace:"pre-line"}}>{item.description}</p>
          </div>
          <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>

/* ── AUTH ── */
function AuthModal({mode,setMode,onClose,users,saveUsers,onLogin,onSignup,cfg}){
  const[f,setF]=useState({name:"",email:"",password:""});
  const[err,setErr]=useState("");
  const[busy,setBusy]=useState(false);
  const go=()=>{
    setErr("");setBusy(true);
    if(mode==="signup"){
      if(!f.name||!f.email||!f.password){setErr("Please fill in all fields.");setBusy(false);return}
      if(!/\S+@\S+\.\S+/.test(f.email)){setErr("Please enter a valid email.");setBusy(false);return}
      if(users.find(u=>u.email===f.email)){setErr("Email already registered.");setBusy(false);return}
      const nu={id:uid(),name:f.name,email:f.email,password:f.password,discUsed:false,createdAt:new Date().toISOString()};
      saveUsers([...users,nu]);onSignup(nu);
    }else{
      if(!f.email||!f.password){setErr("Please fill in all fields.");setBusy(false);return}
      const u=users.find(u=>u.email===f.email&&u.password===f.password);
      if(!u){setErr("Invalid email or password.");setBusy(false);return}
      onLogin(u);
    }
    setBusy(false);
  };
  return(
    <>
      <div className="oi" onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",zIndex:300}}/>
      <div className="mi" style={{position:"fixed",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:"min(420px,92vw)",background:C.white,borderRadius:24,zIndex:301,padding:"38px 32px",boxShadow:"0 22px 56px rgba(0,0,0,.13)"}}>
        <button onClick={onClose} className="btn" style={{position:"absolute",top:14,right:14,width:30,height:30,borderRadius:"50%",background:C.cream,fontSize:18,color:C.t,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
        <div style={{textAlign:"center",marginBottom:26}}>
          <div className="fl" style={{fontSize:32,marginBottom:7}}>✦</div>
          <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:500,color:C.t,marginBottom:5}}>{mode==="login"?"Welcome back":`Join ${cfg.siteName}`}</h2>
          {mode==="signup"&&<p style={{fontSize:13,color:C.pd}}>🎁 Get {cfg.discPct}% off your first order!</p>}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:11}}>
          {mode==="signup"&&<input placeholder="Your name" value={f.name} onChange={e=>setF({...f,name:e.target.value})} style={iSt()}/>}
          <input type="email" placeholder="Email address" value={f.email} onChange={e=>setF({...f,email:e.target.value})} style={iSt()}/>
          <input type="password" placeholder="Password" value={f.password} onChange={e=>setF({...f,password:e.target.value})} onKeyDown={e=>e.key==="Enter"&&go()} style={iSt()}/>
          {err&&<p style={{fontSize:13,color:"#C0504D",textAlign:"center"}}>{err}</p>}
          <button onClick={go} disabled={busy} className="btn" style={{padding:13,background:C.t,color:C.white,borderRadius:11,fontSize:14,fontWeight:500,marginTop:3}}>
            {busy?"…":mode==="login"?"Log In":"Create Account"}
          </button>
          <p style={{textAlign:"center",fontSize:13,color:C.tm}}>
            {mode==="login"?"Don't have an account? ":"Already have an account? "}
            <button onClick={()=>setMode(mode==="login"?"signup":"login")} style={{background:"none",border:"none",color:C.pd,cursor:"pointer",fontSize:13,fontWeight:600,textDecoration:"underline"}}>
              {mode==="login"?"Sign up":"Log in"}
            </button>
          </p>
        </div>
      </div>
    </>
  );
}

/* ── ITEM FORM ── */
function ItemForm({item,onSave,onClose}){
  const[f,setF]=useState({
    name:item?item.name:"",
    price:item?item.price:"",
    originalPrice:item?item.originalPrice:"",
    images:item&&item.images&&item.images.length?item.images:[""],
    description:item?item.description:"",
    category:item?item.category:"",
    stock:item?item.stock:10,
    featured:item?item.featured:false,
    tags:item&&item.tags?item.tags.join(", "):""
  });
  const[err,setErr]=useState("");
  const save=()=>{
    if(!f.name||!f.price){setErr("Name and price are required.");return}
    const tags=f.tags?f.tags.split(",").map(t=>t.trim()).filter(Boolean):[];
    const images=f.images.filter(i=>i.trim());
    if(!images.length)images.push("");
    onSave({
      ...(item?{id:item.id}:{}),
      name:f.name,price:parseFloat(f.price),
      originalPrice:f.originalPrice?parseFloat(f.originalPrice):null,
      images,description:f.description,category:f.category,
      stock:parseInt(f.stock)||0,featured:f.featured,tags
    });
  };
  const setImg=(i,v)=>{const imgs=[...f.images];imgs[i]=v;setF({...f,images:imgs})};
  const rmImg=i=>setF({...f,images:f.images.filter((_,j)=>j!==i)});

  return(
    <>
      <div className="oi" onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.38)",zIndex:300}}/>
      <div className="mi" style={{position:"fixed",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:"min(530px,95vw)",background:C.white,borderRadius:24,zIndex:301,padding:"30px 26px",maxHeight:"90vh",overflowY:"auto",boxShadow:"0 22px 56px rgba(0,0,0,.13)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
          <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,color:C.t}}>{item?"Edit Item":"Add New Item"}</h2>
          <button onClick={onClose} className="btn" style={{width:30,height:30,borderRadius:"50%",background:C.cream,fontSize:18,color:C.t,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:13}}>
          <div><Lbl c="Item Name *"/><input value={f.name} onChange={e=>setF({...f,name:e.target.value})} placeholder="e.g. Celestial Dream Box" style={iSt()}/></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div><Lbl c="Price (RM) *"/><input type="number" step=".01" value={f.price} onChange={e=>setF({...f,price:e.target.value})} placeholder="0.00" style={iSt()}/></div>
            <div><Lbl c="Original Price (sale)"/><input type="number" step=".01" value={f.originalPrice||""} onChange={e=>setF({...f,originalPrice:e.target.value})} placeholder="Leave empty if no sale" style={iSt()}/></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div><Lbl c="Category"/><input value={f.category} onChange={e=>setF({...f,category:e.target.value})} placeholder="e.g. Beauty, Luxury" style={iSt()}/></div>
            <div><Lbl c="Stock"/><input type="number" value={f.stock} onChange={e=>setF({...f,stock:e.target.value})} style={iSt()}/></div>
          </div>
          <div>
            <Lbl c="Image URLs (paste image link from internet)"/>
            {f.images.map((img,i)=>(
              <div key={i} style={{display:"flex",gap:7,marginBottom:7}}>
                <input value={img} onChange={e=>setImg(i,e.target.value)} placeholder={`Image URL ${i+1}`} style={{...iSt(),flex:1}}/>
                {f.images.length>1&&<button onClick={()=>rmImg(i)} className="btn" style={{background:"#FFE0E0",borderRadius:8,padding:"0 12px",color:"#C0504D",fontSize:17,flexShrink:0}}>×</button>}
              </div>
            ))}
            <button onClick={()=>setF({...f,images:[...f.images,""]})} className="btn"
              style={{width:"100%",background:C.cream,border:`1px dashed ${C.b}`,borderRadius:8,padding:"7px",fontSize:12,color:C.tm}}>
              + Add another image
            </button>
          </div>
          <div><Lbl c="Description"/><textarea value={f.description} onChange={e=>setF({...f,description:e.target.value})} rows={4} placeholder="Describe what's inside this mystery box…" style={{...iSt(),resize:"vertical",borderRadius:11}}/></div>
          <div><Lbl c="Tags (comma separated)"/><input value={f.tags} onChange={e=>setF({...f,tags:e.target.value})} placeholder="new, bestseller, limited, popular" style={iSt()}/></div>
          <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
            <div onClick={()=>setF({...f,featured:!f.featured})}
              style={{width:42,height:22,background:f.featured?C.pd:C.b,borderRadius:50,position:"relative",transition:"background .2s",cursor:"pointer",flexShrink:0}}>
              <div style={{width:16,height:16,background:C.white,borderRadius:"50%",position:"absolute",top:3,left:f.featured?23:3,transition:"left .2s",boxShadow:"0 1px 4px rgba(0,0,0,.15)"}}/>
            </div>
            <span style={{fontSize:13,color:C.t}}>Featured on homepage</span>
          </label>
          {err&&<p style={{fontSize:13,color:"#C0504D"}}>{err}</p>}
          <div style={{display:"flex",gap:9,marginTop:3}}>
            <button onClick={onClose} className="btn" style={{flex:1,padding:11,background:C.cream,border:`1.5px solid ${C.b}`,borderRadius:11,fontSize:13,color:C.t}}>Cancel</button>
            <button onClick={save} className="btn" style={{flex:2,padding:11,background:C.t,color:C.white,borderRadius:11,fontSize:13,fontWeight:500}}>{item?"Save Changes":"Add Item"}</button>
          </div>
        </div>
      </div>
    </>
  );
}

/* ── RENDER ── */
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
